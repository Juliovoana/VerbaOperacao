<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cotação de Produtos - Preço de Venda</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23e65100'/%3E%3Cstop offset='1' stop-color='%231565c0'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect x='4' y='4' width='56' height='56' rx='14' fill='url(%23g)'/%3E%3Cpath d='M20 34 L32 20 L48 20 L48 36 L34 50 Z' fill='%23ffffff' fill-opacity='0.95'/%3E%3Ccircle cx='41' cy='27' r='4' fill='url(%23g)'/%3E%3C/svg%3E">
<style>
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; margin: 20px; }
    input[type="text"] { padding: 10px; width: 100%; max-width: 400px; margin-bottom: 15px; }
    .linha-busca {
        display: flex;
        gap: 8px;
        align-items: center;
        max-width: 400px;
        margin-bottom: 15px;
    }
    .linha-busca input[type="text"] { margin-bottom: 0; flex: 1; }
    .btn-buscar-manual {
        display: none;
        width: 40px;
        height: 40px;
        min-width: 40px;
        border: none;
        border-radius: 4px;
        background-color: #e65100;
        color: #fff;
        cursor: pointer;
        align-items: center;
        justify-content: center;
    }
    .btn-buscar-manual svg { width: 18px; height: 18px; }
    .btn-buscar-manual:hover { background-color: #b93e00; }
    .btn-buscar-manual.visivel { display: flex; }
    .linha-topo {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 12px;
    }
    .acoes-icone {
        display: flex;
        gap: 8px;
        align-items: center;
    }
    .btn-icone {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        transition: transform 0.1s ease-in-out, opacity 0.1s;
    }
    .btn-icone:hover { opacity: 0.85; transform: scale(1.06); }
    .btn-icone svg { width: 18px; height: 18px; }
    .btn-icone.importar { background-color: #2e7d32; }
    .btn-icone.baixar { background-color: #1565c0; }
    .btn-icone.online { background-color: #6a1b9a; }
    #csvFile { display: none; }
    #painelOnline {
        display: none;
        background: #fff3e8;
        border: 1px solid #ffd3ad;
        border-radius: 6px;
        padding: 14px;
        margin-bottom: 15px;
    }
    #painelOnline.aberto { display: block; }
    #painelOnline label {
        display: block;
        font-size: 0.85em;
        font-weight: bold;
        color: #444;
        margin-bottom: 4px;
    }
    #painelOnline input[type="text"],
    #painelOnline input[type="url"] {
        width: 100%;
        max-width: none;
        padding: 8px;
        margin-bottom: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
    }
    .linha-config {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: flex-end;
    }
    .linha-config > div { flex: 1; min-width: 180px; }
    #painelOnline select {
        width: 100%;
        padding: 8px;
        margin-bottom: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
    }
    .btn-salvar-online, .btn-atualizar-agora {
        padding: 9px 16px;
        border: none;
        border-radius: 4px;
        color: #fff;
        cursor: pointer;
        font-size: 0.9em;
        height: 38px;
    }
    .btn-salvar-online { background-color: #6a1b9a; }
    .btn-atualizar-agora { background-color: #e65100; }
    #ultimaAtualizacao {
        display: block;
        font-size: 0.82em;
        color: #666;
        margin-top: 8px;
    }
    #statusImport {
        font-size: 0.9em;
        color: #555;
        display: block;
        margin-bottom: 8px;
    }
    #statusImport.erro { color: #b00020; }
    #statusImport.sucesso { color: #2e7d32; }
    .filtro-empresa {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn-empresa {
        padding: 8px 18px;
        border: 2px solid #e65100;
        background-color: #fff;
        color: #e65100;
        border-radius: 20px;
        cursor: pointer;
        font-size: 0.95em;
        font-weight: bold;
        transition: all 0.15s ease-in-out;
    }
    .btn-empresa:hover { background-color: #fff0e6; }
    .btn-empresa.ativo {
        background-color: #e65100;
        color: #fff;
    }
    #contadorProdutos {
        font-size: 0.9em;
        color: #555;
        margin-bottom: 4px;
        display: block;
    }
    #dataGeracaoCsv {
        font-size: 0.85em;
        color: #777;
        display: block;
        margin-bottom: 12px;
        font-style: italic;
    }
    .btn-icone.atualizar-rapido {
        background-color: #e65100;
    }
    .btn-icone.atualizar-rapido svg.girando {
        animation: girar 0.8s linear infinite;
    }
    @keyframes girar {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background-color: #fff3e8; }
    tr:nth-child(even) { background-color: #f9f9f9; }
    .preco-venda { font-weight: bold; color: #1565c0; }
    /* Esconde labels no desktop */
    .valores::before {
        content: "";
        font-weight: bold;
    }
    /* Layout responsivo para celular */
    @media (max-width: 700px) {
        table, thead, tbody, th, td, tr {
            display: block;
            width: 100%;
        }
        thead { display: none; }
        tr {
            margin-bottom: 10px;
            border: 1px solid #ccc;
            padding: 8px;
            background: #fff;
            overflow-wrap: break-word;
        }
        td {
            border: none;
            padding: 5px 0;
            white-space: normal;
            word-break: break-word;
        }
        td:first-child {
            font-weight: bold;
            font-size: 1.1em;
        }
        td:nth-child(2) {
            margin-bottom: 8px;
            font-size: 0.95em;
            color: #333;
        }
        /* Adiciona rótulos apenas no celular */
        td.venda::before { content: "Preço de Venda: "; font-weight: bold; }
        td.estoque::before { content: "Estoque: "; font-weight: bold; }
    }
</style>
</head>
<body>
<h2>Cotação de Produtos - Preço de Venda</h2>
<div class="linha-topo">
    <div class="filtro-empresa">
        <button class="btn-empresa ativo" data-empresa="todos">Todos</button>
        <button class="btn-empresa" data-empresa="BT">Berto</button>
        <button class="btn-empresa" data-empresa="HS">HS</button>
    </div>
    <div class="acoes-icone">
        <label for="csvFile" class="btn-icone importar" title="Importar CSV">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 3v12"/>
                <path d="M7 10l5 5 5-5"/>
                <path d="M4 19h16"/>
            </svg>
        </label>
        <input type="file" id="csvFile" accept=".csv">
        <button id="btnBaixarHtml" class="btn-icone baixar" title="Baixar HTML com estes produtos">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 21V9"/>
                <path d="M7 14l5 -5 5 5"/>
                <path d="M4 5h16"/>
            </svg>
        </button>
        <button id="btnToggleOnline" class="btn-icone online" title="Configurar importação automática online">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 17H7A5 5 0 0 1 7 7h2"/>
                <path d="M15 7h2a5 5 0 1 1 0 10h-2"/>
                <line x1="8" y1="12" x2="16" y2="12"/>
            </svg>
        </button>
        <button id="btnAtualizarRapido" class="btn-icone atualizar-rapido" title="Buscar produtos, estoque e valores atualizados agora">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 4v6h-6"/>
                <path d="M1 20v-6h6"/>
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10"/>
                <path d="M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
            </svg>
        </button>
    </div>
</div>
<div id="painelOnline">
    <div class="linha-config">
        <div>
            <label for="urlCsvOnline">Link do Apps Script (Web App)</label>
            <input type="url" id="urlCsvOnline" placeholder="https://script.google.com/macros/s/SEU_ID/exec">
            <small style="color:#666; display:block; margin-top:-6px; margin-bottom:10px;">
                ⚠️ Use o link do <strong>Apps Script implantado como "App da Web"</strong> (termina em <code>/exec</code>). Links do Drive/Sheets não funcionam (bloqueio de CORS do Google).
            </small>
        </div>
    </div>
    <div class="linha-config">
        <div>
            <label for="intervaloAtualizacao">Atualizar automaticamente a cada</label>
            <select id="intervaloAtualizacao">
                <option value="0">Não atualizar sozinho (só manual)</option>
                <option value="15">15 minutos</option>
                <option value="30">30 minutos</option>
                <option value="60" selected>1 hora</option>
                <option value="180">3 horas</option>
            </select>
        </div>
        <button class="btn-salvar-online" id="btnSalvarOnline">Salvar e conectar</button>
        <button class="btn-atualizar-agora" id="btnAtualizarAgora">Atualizar agora</button>
    </div>
    <div class="linha-config">
        <div>
            <label for="modoBusca">Modo de busca</label>
            <select id="modoBusca">
                <option value="tempo-real">Buscar a cada caractere digitado</option>
                <option value="botao" selected>Buscar só ao clicar no botão (mais rápido em listas grandes)</option>
            </select>
        </div>
    </div>
    <span id="ultimaAtualizacao"></span>
</div>
<div class="linha-busca">
    <input type="text" id="buscar" placeholder="Digite para buscar produto...">
    <button id="btnBuscarManual" class="btn-buscar-manual" title="Buscar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
    </button>
</div>
<span id="statusImport"></span>
<span id="contadorProdutos"></span>
<span id="dataGeracaoCsv"></span>
<table id="tabela">
    <thead>
        <tr>
            <th>Código</th>
            <th>Descrição</th>
            <th>Preço de Venda</th>
            <th>Estoque</th>
        </tr>
    </thead>
    <tbody id="lista">
    </tbody>
</table>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>
let produtos = [
    {codigo: "HS10659", descricao: "ABAFADOR DE RUIDOS CONCHA 12DB KALIPSO", venda: 39.72, estoque: 0},
    {codigo: "HS8254", descricao: "ABAFADOR DE RUIDOS CONCHA 17DB DYSTRAY", venda: 39.72, estoque: 0},
    {codigo: "HS15173", descricao: "ABAFADOR DE RUIDOS CONCHA ARS 24DB AGENA", venda: 81.16, estoque: 0},
    {codigo: "HS9216", descricao: "ABAFADOR DE RUIDOS CONCHA PLASTCOR", venda: 27.83, estoque: 0},
    {codigo: "HS16719", descricao: "ABCDÁRIO DE AÇO 4MM STARFER", venda: 64.61, estoque: 0},
    {codigo: "HS22980", descricao: "ABCDÁRIO DE AÇO 8MM STARFER", venda: 149.30, estoque: 0},
    {codigo: "HS5129", descricao: "ABRACADEIRA 09 X 11MM NORMIX", venda: 2.29, estoque: 0}
];
// Formata número como moeda brasileira (R$)
function formatarMoeda(valor) {
    const num = Number(valor) || 0;
    return num.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

// Ordena a lista por descrição (ordem alfabética, ignorando acentos/caixa)
function ordenarPorDescricao(lista) {
    return [...lista].sort((a, b) =>
        a.descricao.localeCompare(b.descricao, 'pt-BR', { sensitivity: 'base' })
    );
}

// Função para carregar tabela
function carregarTabela(lista) {
    const tbody = document.getElementById("lista");
    tbody.innerHTML = "";
    ordenarPorDescricao(lista).forEach(prod => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${prod.codigo}</td>
            <td>${prod.descricao}</td>
            <td class="valores venda preco-venda">${formatarMoeda(prod.venda)}</td>
            <td class="valores estoque">${prod.estoque}</td>
        `;
        tbody.appendChild(tr);
    });
}

let empresaAtual = "todos"; // "todos", "BT" ou "HS"

// Aplica o filtro de empresa + o filtro de busca textual juntos
function aplicarFiltros() {
    const termo = document.getElementById("buscar").value.toLowerCase();
    const palavras = termo.split(/\s+/).filter(p => p.length > 0);
    const filtrados = produtos.filter(p => {
        const prefixo = p.codigo.substring(0, 2).toUpperCase();
        const passaEmpresa = empresaAtual === "todos" || prefixo === empresaAtual;
        const textoCompleto = (p.codigo + " " + p.descricao).toLowerCase();
        const passaBusca = palavras.every(palavra => textoCompleto.includes(palavra));
        return passaEmpresa && passaBusca;
    });
    carregarTabela(filtrados);

    const contador = document.getElementById("contadorProdutos");
    if (filtrados.length === produtos.length) {
        contador.textContent = `Exibindo todos os ${produtos.length} produtos`;
    } else {
        contador.textContent = `Exibindo ${filtrados.length} de ${produtos.length} produtos`;
    }
}

// Carregar todos ao iniciar
aplicarFiltros();

// Filtro de busca - respeita o modo escolhido (tempo real ou por botão)
const MODO_BUSCA_KEY = "modoBuscaCaractereVendedor";

function carregarModoBusca() {
    return localStorage.getItem(MODO_BUSCA_KEY) || "botao";
}

function salvarModoBusca(modo) {
    localStorage.setItem(MODO_BUSCA_KEY, modo);
}

function aplicarModoBusca(modo) {
    const btnBuscarManual = document.getElementById("btnBuscarManual");
    const inputBusca = document.getElementById("buscar");
    if (modo === "botao") {
        inputBusca.removeEventListener("input", aplicarFiltros);
        btnBuscarManual.classList.add("visivel");
    } else {
        inputBusca.addEventListener("input", aplicarFiltros);
        btnBuscarManual.classList.remove("visivel");
    }
}

document.getElementById("buscar").addEventListener("keydown", function(e) {
    if (e.key === "Enter") aplicarFiltros();
});

document.getElementById("btnBuscarManual").addEventListener("click", aplicarFiltros);

document.getElementById("modoBusca").addEventListener("change", function() {
    salvarModoBusca(this.value);
    aplicarModoBusca(this.value);
});

(function iniciarModoBusca() {
    const modoSalvo = carregarModoBusca();
    document.getElementById("modoBusca").value = modoSalvo;
    aplicarModoBusca(modoSalvo);
})();

// Filtro por empresa (botões)
document.querySelectorAll(".btn-empresa").forEach(btn => {
    btn.addEventListener("click", function() {
        document.querySelectorAll(".btn-empresa").forEach(b => b.classList.remove("ativo"));
        this.classList.add("ativo");
        empresaAtual = this.dataset.empresa;
        aplicarFiltros();
    });
});

// Converte texto de valor (com vírgula, ponto ou "R$") em número
function paraNumero(texto) {
    if (texto === undefined || texto === null) return 0;
    let limpo = String(texto).replace(/R\$\s?/gi, "").trim();
    // Se tem vírgula como separador decimal (padrão BR), remove pontos de milhar e troca vírgula por ponto
    if (limpo.includes(",")) {
        limpo = limpo.replace(/\./g, "").replace(",", ".");
    }
    const num = parseFloat(limpo);
    return isNaN(num) ? 0 : num;
}

// Busca o valor de uma linha do CSV tentando várias possíveis chaves de coluna
function buscarCampo(linha, possiveisNomes) {
    const chaves = Object.keys(linha);
    for (const nome of possiveisNomes) {
        const chave = chaves.find(k => k.trim().toLowerCase() === nome);
        if (chave !== undefined) return linha[chave];
    }
    return undefined;
}

const statusEl = document.getElementById("statusImport");
let dataGeracaoCsvAtual = "";

// Atualiza o texto exibido com a data/hora que o CSV foi gerado (coluna "Atualizacao")
function atualizarExibicaoDataGeracao(valor) {
    dataGeracaoCsvAtual = (valor || "").toString().trim();
    const el = document.getElementById("dataGeracaoCsv");
    el.textContent = dataGeracaoCsvAtual
        ? `📅 Dados gerados em: ${dataGeracaoCsvAtual}`
        : "";
}

document.getElementById("csvFile").addEventListener("change", function(e) {
    const arquivo = e.target.files[0];
    if (!arquivo) return;

    statusEl.className = "";
    statusEl.textContent = "Lendo arquivo...";

    Papa.parse(arquivo, {
        header: true,
        skipEmptyLines: true,
        encoding: "UTF-8",
        delimiter: ";",
        complete: function(resultado) {
            try {
                const linhas = resultado.data;
                const novosProdutos = linhas.map(linha => ({
                    codigo: (buscarCampo(linha, ["codigo", "código"]) || "").toString().trim(),
                    descricao: (buscarCampo(linha, ["descricao", "descrição"]) || "").toString().trim(),
                    venda: paraNumero(buscarCampo(linha, ["venda", "valor venda"])),
                    estoque: parseInt(buscarCampo(linha, ["estoque"]), 10) || 0
                })).filter(p => p.codigo !== "");

                if (novosProdutos.length === 0) {
                    statusEl.className = "erro";
                    statusEl.textContent = "Nenhum produto válido encontrado no CSV. Verifique as colunas.";
                    return;
                }

                if (linhas.length > 0) {
                    atualizarExibicaoDataGeracao(buscarCampo(linhas[0], ["atualizacao", "atualização"]));
                }

                produtos = novosProdutos;
                document.getElementById("buscar").value = "";
                document.querySelectorAll(".btn-empresa").forEach(b => b.classList.remove("ativo"));
                document.querySelector('.btn-empresa[data-empresa="todos"]').classList.add("ativo");
                empresaAtual = "todos";
                aplicarFiltros();
                statusEl.className = "sucesso";
                statusEl.textContent = `${produtos.length} produto(s) importado(s) com sucesso.`;
            } catch (err) {
                statusEl.className = "erro";
                statusEl.textContent = "Erro ao processar o CSV.";
                console.error(err);
            }
        },
        error: function(err) {
            statusEl.className = "erro";
            statusEl.textContent = "Erro ao ler o arquivo CSV.";
            console.error(err);
        }
    });

    // Permite importar o mesmo arquivo novamente se necessário
    e.target.value = "";
});

// ===== Importação automática via link online (Apps Script) =====
// Cole aqui o link do Apps Script (Web App) para que já venha pré-configurado
// em qualquer navegador/computador, sem precisar colar o link manualmente.
const URL_PADRAO_ONLINE = "https://script.google.com/macros/s/AKfycbz6wdYirt-5LqIzhNeT4UTSsjdpiicPDx0N9w9-a2-_bhS8XVojMp2kuRYRZpCdABFY/exec";
const INTERVALO_PADRAO_MIN = 60;

const CONFIG_KEY = "produtosOnlineConfigVendedor";
let timerAtualizacao = null;

function carregarConfigOnline() {
    try {
        const raw = localStorage.getItem(CONFIG_KEY);
        if (raw) return JSON.parse(raw);
    } catch (e) {
        // ignora e cai no padrão abaixo
    }
    return URL_PADRAO_ONLINE ? { url: URL_PADRAO_ONLINE, intervaloMin: INTERVALO_PADRAO_MIN } : null;
}

function salvarConfigOnline(url, intervaloMin) {
    localStorage.setItem(CONFIG_KEY, JSON.stringify({ url, intervaloMin }));
}

// Converte um link de compartilhamento comum do Google Drive em link de download direto
function normalizarUrlDrive(url) {
    const m = url.match(/drive\.google\.com\/file\/d\/([^/]+)/);
    if (m) {
        return `https://drive.google.com/uc?export=download&id=${m[1]}`;
    }
    return url;
}

// Busca dados via JSONP (contorna bloqueio de CORS) - usado para links do Apps Script
function buscarViaJSONP(url) {
    return new Promise((resolve, reject) => {
        const nomeCallback = "cbGoogleScript_" + Date.now() + "_" + Math.floor(Math.random() * 10000);
        const scriptEl = document.createElement("script");
        let finalizado = false;

        const limpar = () => {
            delete window[nomeCallback];
            if (scriptEl.parentNode) scriptEl.parentNode.removeChild(scriptEl);
            clearTimeout(timeoutId);
        };

        const timeoutId = setTimeout(() => {
            if (!finalizado) {
                finalizado = true;
                limpar();
                reject(new Error("Tempo esgotado ao buscar via Apps Script (verifique se o deploy está com acesso 'Qualquer pessoa')."));
            }
        }, 15000);

        window[nomeCallback] = function(dados) {
            if (finalizado) return;
            finalizado = true;
            limpar();
            resolve(dados);
        };

        scriptEl.onerror = () => {
            if (finalizado) return;
            finalizado = true;
            limpar();
            reject(new Error("Falha ao carregar o script do Apps Script."));
        };

        const separador = url.includes("?") ? "&" : "?";
        scriptEl.src = url + separador + "callback=" + nomeCallback + "&_=" + Date.now();
        document.body.appendChild(scriptEl);
    });
}

function processarCsvTexto(texto) {
    const resultado = Papa.parse(texto, {
        header: true,
        skipEmptyLines: true,
        delimiter: "" // auto-detecta ; ou , conforme o arquivo
    });
    const novosProdutos = resultado.data.map(linha => ({
        codigo: (buscarCampo(linha, ["codigo", "código"]) || "").toString().trim(),
        descricao: (buscarCampo(linha, ["descricao", "descrição"]) || "").toString().trim(),
        venda: paraNumero(buscarCampo(linha, ["venda", "valor venda"])),
        estoque: parseInt(buscarCampo(linha, ["estoque"]), 10) || 0
    })).filter(p => p.codigo !== "");

    const dataGeracao = resultado.data.length > 0
        ? buscarCampo(resultado.data[0], ["atualizacao", "atualização"])
        : "";

    return { produtos: novosProdutos, dataGeracao };
}

async function buscarCsvOnline(mostrarStatus = true) {
    const config = carregarConfigOnline();
    if (!config || !config.url) return;

    const ultimaAtEl = document.getElementById("ultimaAtualizacao");
    if (mostrarStatus) {
        statusEl.className = "";
        statusEl.textContent = "Buscando dados online...";
    }

    try {
        const ehAppsScript = /script\.google\.com\/macros/.test(config.url);
        let texto;

        if (ehAppsScript) {
            texto = await buscarViaJSONP(config.url);
        } else {
            const urlFinal = normalizarUrlDrive(config.url);
            const cacheBuster = (urlFinal.includes("?") ? "&" : "?") + "_=" + Date.now();
            const resposta = await fetch(urlFinal + cacheBuster, { cache: "no-store" });
            if (!resposta.ok) throw new Error("HTTP " + resposta.status);
            texto = await resposta.text();
        }

        const { produtos: novosProdutos, dataGeracao } = processarCsvTexto(texto);

        if (novosProdutos.length === 0) {
            throw new Error("Nenhum produto válido encontrado no arquivo online.");
        }

        produtos = novosProdutos;
        atualizarExibicaoDataGeracao(dataGeracao);
        aplicarFiltros();

        const agora = new Date();
        ultimaAtEl.textContent = `Última atualização automática: ${agora.toLocaleString('pt-BR')} (${produtos.length} produtos)`;
        if (mostrarStatus) {
            statusEl.className = "sucesso";
            statusEl.textContent = `${produtos.length} produto(s) atualizado(s) via link online.`;
        }
    } catch (err) {
        console.error(err);
        if (mostrarStatus) {
            const ehLinkDrive = /drive\.google\.com/.test(config.url);
            const ehSheetsPub = /docs\.google\.com\/spreadsheets/.test(config.url);
            statusEl.className = "erro";
            if (ehLinkDrive || ehSheetsPub) {
                statusEl.textContent = "Links do Drive/Sheets são bloqueados por CORS. Use um link do Apps Script (termina em /exec).";
            } else {
                statusEl.textContent = "Não foi possível buscar os dados. Verifique o link.";
            }
        }
        ultimaAtEl.textContent = `Falha na última tentativa: ${new Date().toLocaleString('pt-BR')}`;
    }
}

function agendarAtualizacaoAutomatica(intervaloMin) {
    if (timerAtualizacao) clearInterval(timerAtualizacao);
    if (intervaloMin > 0) {
        timerAtualizacao = setInterval(() => buscarCsvOnline(false), intervaloMin * 60 * 1000);
    }
}

// Alterna a exibição do painel de configuração online
document.getElementById("btnToggleOnline").addEventListener("click", function() {
    document.getElementById("painelOnline").classList.toggle("aberto");
});

document.getElementById("btnSalvarOnline").addEventListener("click", function() {
    let url = document.getElementById("urlCsvOnline").value.trim();
    const intervaloMin = parseInt(document.getElementById("intervaloAtualizacao").value, 10);
    if (!url) {
        if (URL_PADRAO_ONLINE) {
            url = URL_PADRAO_ONLINE;
            document.getElementById("urlCsvOnline").value = url;
        } else {
            statusEl.className = "erro";
            statusEl.textContent = "Cole o link do Apps Script antes de salvar (nenhum link padrão foi definido no arquivo).";
            return;
        }
    }
    salvarConfigOnline(url, intervaloMin);
    agendarAtualizacaoAutomatica(intervaloMin);
    buscarCsvOnline(true);
});

document.getElementById("btnAtualizarAgora").addEventListener("click", function() {
    buscarCsvOnline(true);
});

// Ícone de atualização rápida no topo - mesma função, com feedback visual de "girando"
document.getElementById("btnAtualizarRapido").addEventListener("click", async function() {
    const config = carregarConfigOnline();
    if (!config || !config.url) {
        statusEl.className = "erro";
        statusEl.textContent = "Configure primeiro o link online no ícone 🔗 antes de usar a atualização rápida.";
        document.getElementById("painelOnline").classList.add("aberto");
        return;
    }
    const svgEl = this.querySelector("svg");
    svgEl.classList.add("girando");
    this.disabled = true;
    await buscarCsvOnline(true);
    svgEl.classList.remove("girando");
    this.disabled = false;
});

// Ao abrir a página, recarrega configuração salva e já busca uma vez
(function iniciarOnline() {
    const config = carregarConfigOnline();
    if (config && config.url) {
        document.getElementById("urlCsvOnline").value = config.url;
        document.getElementById("intervaloAtualizacao").value = String(config.intervaloMin);
        agendarAtualizacaoAutomatica(config.intervaloMin);
        buscarCsvOnline(false);
    }
})();

// Gera um novo arquivo HTML idêntico a este, mas com os produtos atuais
// gravados diretamente no código (substitui a lista original)
document.getElementById("btnBaixarHtml").addEventListener("click", function() {
    try {
        const fonteAtual = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
        const jsonProdutos = JSON.stringify(produtos, null, 4);
        const novoHtml = fonteAtual.replace(
            /let produtos = \[[\s\S]*?\];/,
            `let produtos = ${jsonProdutos};`
        );

        const blob = new Blob([novoHtml], { type: "text/html;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        const agora = new Date();
        const carimbo = agora.toISOString().slice(0, 16).replace(/[-:T]/g, "");
        a.href = url;
        a.download = `cotacao-vendedores-${carimbo}.html`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        statusEl.className = "sucesso";
        statusEl.textContent = `Arquivo gerado com ${produtos.length} produto(s) gravado(s).`;
    } catch (err) {
        statusEl.className = "erro";
        statusEl.textContent = "Erro ao gerar o arquivo HTML.";
        console.error(err);
    }
});
